version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ids_user
      POSTGRES_PASSWORD: ids_password
      POSTGRES_DB: hybrid_ids
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ids_user -d hybrid_ids"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # ── NOTE: network_mode: host is Linux-only; removed for Windows compatibility.
    # ── Live packet capture is disabled on Windows Docker Desktop.
    # ── Use the "Simulate DoS" / "Simulate Anomaly" buttons on the dashboard.
    environment:
      DATABASE_URL: postgresql://ids_user:ids_password@db:5432/hybrid_ids
      SECRET_KEY: change-me-in-production
      # ── Live capture (Linux only) ────────────────────────────────────────────
      CAPTURE_ENABLED: "false"
      CAPTURE_INTERFACE: ""
      FLOW_TIMEOUT: "10"
      FLOW_MAX_PACKETS: "200"
      # ── Autonomous traffic generator (Windows-compatible real-time detection) ─
      TRAFFIC_GEN_ENABLED: "true"
      TRAFFIC_GEN_INTERVAL: "2"    # seconds between flow batches
      TRAFFIC_GEN_BURST: "2"       # flows per batch (2 flows every 2s)
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./models:/app/models
      - ./dataset:/app/dataset

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:8000

volumes:
  pgdata:
